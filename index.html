<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMK Portal - ศูนย์รวมแอปพลิเคชัน โรงเรียนวัดแม่กะ</title>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- นำเข้าฟอนต์ Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
        }
        .hidden {
            display: none !important;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-red-800 via-red-600 to-red-700 shadow-lg relative overflow-hidden">
        <!-- Background Decoration -->
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-yellow-400 opacity-20 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-red-900 opacity-30 blur-3xl"></div>

        <div class="container mx-auto px-4 py-8 relative z-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-white p-2 rounded-2xl shadow-xl transform transition-transform hover:scale-105 duration-300">
                        <img 
                            src="https://img2.pic.in.th/logob0b7643db577ceee.png" 
                            alt="WMK Portal Logo" 
                            class="w-20 h-20 object-contain rounded-xl"
                            onerror="this.onerror=null;this.src='https://via.placeholder.com/80?text=WMK';"
                        />
                    </div>
                    <div class="text-center md:text-left text-white">
                        <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-1 text-transparent bg-clip-text bg-gradient-to-r from-white to-yellow-200">
                            WMK Portal
                        </h1>
                        <p class="text-red-100 text-sm md:text-base font-medium">
                            ศูนย์รวมแอปพลิเคชัน โรงเรียนวัดแม่กะ
                        </p>
                    </div>
                </div>

                <!-- Search Box -->
                <div class="w-full md:w-auto relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-yellow-500 transition-colors">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input
                        type="text"
                        id="search-input"
                        class="w-full md:w-80 pl-10 pr-4 py-3 rounded-full border-none shadow-inner bg-white/10 backdrop-blur-md text-white placeholder-red-200 focus:bg-white focus:text-gray-800 focus:ring-4 focus:ring-yellow-400/50 transition-all duration-300 outline-none"
                        placeholder="ค้นหาแอปพลิเคชัน..."
                    />
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        
        <!-- State: Loading -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20">
            <i data-lucide="loader-2" class="w-12 h-12 text-red-600 animate-spin mb-4"></i>
            <p class="text-gray-600 font-medium animate-pulse">กำลังโหลดข้อมูลระบบ...</p>
        </div>

        <!-- State: Error -->
        <div id="error-state" class="hidden bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm flex flex-col sm:flex-row items-start gap-4 my-8">
            <i data-lucide="alert-circle" class="text-red-500 w-6 h-6 flex-shrink-0 mt-0.5"></i>
            <div>
                <h3 class="text-red-800 font-semibold text-lg">เกิดข้อผิดพลาด</h3>
                <p id="error-message" class="text-red-600 mt-1 leading-relaxed">ไม่สามารถเชื่อมต่อข้อมูลได้ กรุณาลองใหม่อีกครั้ง</p>
                <button 
                    onclick="window.initSystem()"
                    class="mt-3 px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-medium transition-colors"
                >
                    ลองใหม่อีกครั้ง
                </button>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content-area" class="hidden">
            <!-- Category Filter -->
            <div class="mb-10">
                <div class="flex items-center gap-2 mb-4 text-gray-800">
                    <i data-lucide="layout-grid" class="w-5 h-5 text-red-600"></i>
                    <h2 class="text-xl font-bold">เลือกหมวดหมู่</h2>
                </div>
                <div id="category-container" class="flex flex-wrap gap-2 md:gap-3">
                    <!-- ปุ่มหมวดหมู่จะถูกสร้างที่นี่โดย JS -->
                </div>
            </div>

            <!-- Empty State for Search -->
            <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl shadow-sm border border-gray-100">
                <img src="https://illustrations.popsy.co/amber/falling.svg" alt="Not found" class="w-48 mx-auto opacity-50 mb-4" />
                <h3 class="text-xl font-bold text-gray-800 mb-2">ไม่พบแอปพลิเคชัน</h3>
                <p class="text-gray-500">ลองค้นหาด้วยคำอื่น หรือเลือกหมวดหมู่ใหม่</p>
            </div>

            <!-- Apps Grid -->
            <div id="app-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- การ์ดแอปพลิเคชันจะถูกสร้างที่นี่โดย JS -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6 mt-auto relative z-10">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-500">
            <p id="footer-year">© WMK Portal. All rights reserved.</p>
            <div class="flex items-center gap-2 bg-red-50 text-red-600 px-4 py-2 rounded-full font-medium shadow-sm">
                <i data-lucide="users" class="w-4 h-4"></i>
                <span>ผู้เข้าชมทั้งหมด: <span id="page-views-count" class="font-bold text-red-700">0</span> คน</span>
            </div>
        </div>
    </footer>

    <!-- Application Logic -->
    <script>
        function initIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                setTimeout(initIcons, 50);
            }
        }

        initIcons();
        document.getElementById('footer-year').innerText = `© ${new Date().getFullYear()} WMK Portal. All rights reserved.`;

        // ตัวแปรข้อมูล
        const API_URL = 'https://script.google.com/macros/s/AKfycbzfsKPZkki8RCDe9jrtIM_rv42uVxijZrdOvNncYR_n-apJsK4Do53Uc9LIq2K3PRrpBA/exec';
        let allApps = [];
        let categories = ['ทั้งหมด'];
        let activeCategory = 'ทั้งหมด';
        let searchQuery = '';
        let pageViews = 0;

        // DOM Elements
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const contentArea = document.getElementById('content-area');
        const errorMessage = document.getElementById('error-message');
        const categoryContainer = document.getElementById('category-container');
        const appContainer = document.getElementById('app-container');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const pageViewsCount = document.getElementById('page-views-count');

        window.initSystem = initSystem;

        async function initSystem() {
            showLoading();
            await fetchSheetData();
            renderCategories();
            renderApps();
            showContent();
            
            trackPageView();
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(API_URL + '?_t=' + new Date().getTime(), {
                    method: 'GET',
                    redirect: 'follow',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                pageViews = data.pageViews || 0;
                pageViewsCount.innerText = pageViews.toLocaleString();

                const appData = data.data || [];
                allApps = appData.filter(app => app['ชื่อแอป'] && app['Link']);
                
                const uniqueCategories = [...new Set(allApps.map(app => app['หมวดหมู่']).filter(Boolean))];
                categories = ['ทั้งหมด', ...uniqueCategories];
                
            } catch (err) {
                console.error('Error fetching data:', err);
                
                if (err.name === 'TypeError' && err.message.includes('fetch')) {
                    showError('ไม่สามารถดึงข้อมูลได้ (ถูกบล็อกจากระบบความปลอดภัย CORS)<br><br><b>วิธีแก้ไข:</b> โปรดกลับไปที่หน้า Google Apps Script ของคุณ -> กด <b>การทำให้ใช้งานได้ (Deploy)</b> -> เลือก <b>การทำให้ใช้งานได้รายการใหม่ (New deployment)</b> -> ตรง <b>ผู้มีสิทธิ์เข้าถึง (Who has access)</b> ให้เลือกเป็น <b>"ทุกคน" (Anyone)</b> แล้วนำลิงก์ใหม่มาอัปเดตครับ');
                } else {
                    showError('ไม่สามารถเชื่อมต่อข้อมูลจากตารางได้ กรุณาลองใหม่อีกครั้ง<br><small>' + err.message + '</small>');
                }
            }
        }

        function trackPageView() {
            const hasVisited = sessionStorage.getItem('wmk_visited');
            if (!hasVisited) {
                const trackUrl = API_URL + '?action=view&_t=' + new Date().getTime();
                
                fetch(trackUrl)
                .then(() => {
                    sessionStorage.setItem('wmk_visited', 'true');
                    pageViews += 1;
                    pageViewsCount.innerText = pageViews.toLocaleString();
                })
                .catch(e => {
                    // แผนสำรองถ้า fetch โดนบล็อก
                    new Image().src = trackUrl;
                    sessionStorage.setItem('wmk_visited', 'true');
                });
            }
        }

        window.trackClick = function(appName) {
            // 1. เพิ่มตัวเลขในหน้าเว็บทันที
            const appIndex = allApps.findIndex(a => a['ชื่อแอป'] === appName);
            if(appIndex !== -1) {
               let currentClicks = parseInt(allApps[appIndex]['คลิก']) || 0;
               allApps[appIndex]['คลิก'] = currentClicks + 1;
               renderApps(); 
            }
            
            // 2. ส่งข้อมูลไป Google Sheet
            const trackUrl = API_URL + '?action=click&appName=' + encodeURIComponent(appName) + '&_t=' + new Date().getTime();
            
            // ใช้ fetch ปกติเพื่อให้เห็น Error จริง
            fetch(trackUrl)
                .then(res => res.json())
                .then(data => console.log('บันทึกการคลิกแล้ว:', data))
                .catch(e => {
                    console.warn("Fetch ถูกบล็อก กำลังใช้แผนสำรอง (Image Beacon)...");
                    // 3. แผนสำรอง: สร้างรูปภาพล่องหนเพื่อส่ง Request (วิธีนี้เบราว์เซอร์จะไม่บล็อกแม้หน้าต่างจะถูกเปิดไปแล้ว)
                    const beacon = new Image();
                    beacon.src = trackUrl;
                });
        };

        function renderCategories() {
            categoryContainer.innerHTML = '';
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.textContent = category || 'ไม่มีหมวดหมู่';
                
                const baseClasses = "px-5 py-2.5 rounded-full text-sm md:text-base font-semibold transition-all duration-300 shadow-sm border";
                const activeClasses = "bg-red-600 text-white border-red-600 shadow-md transform scale-105";
                const inactiveClasses = "bg-white text-gray-700 border-gray-200 hover:border-yellow-400 hover:bg-yellow-50 hover:text-red-700";
                
                btn.className = `${baseClasses} ${activeCategory === category ? activeClasses : inactiveClasses}`;
                
                btn.onclick = () => {
                    activeCategory = category;
                    renderCategories();
                    renderApps();
                };
                
                categoryContainer.appendChild(btn);
            });
        }

        function renderApps() {
            const filteredApps = allApps.filter(app => {
                const matchCategory = activeCategory === 'ทั้งหมด' || app['หมวดหมู่'] === activeCategory;
                const searchLower = searchQuery.toLowerCase();
                const matchSearch = (app['ชื่อแอป']?.toLowerCase().includes(searchLower)) || 
                                    (app['คำอธิบาย']?.toLowerCase().includes(searchLower));
                return matchCategory && matchSearch;
            }).sort((a, b) => {
                const clicksA = parseInt(a['คลิก']) || 0;
                const clicksB = parseInt(b['คลิก']) || 0;
                return clicksB - clicksA;
            });

            appContainer.innerHTML = '';

            if (filteredApps.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                filteredApps.forEach(app => {
                    const clickCount = parseInt(app['คลิก']) || 0;
                    const safeAppName = app['ชื่อแอป'].replace(/"/g, '&quot;').replace(/'/g, "\\'");

                    const categoryBadge = app['หมวดหมู่'] 
                        ? `<div class="mb-3">
                               <span class="px-3 py-1 bg-yellow-100 text-yellow-800 text-xs font-semibold rounded-full inline-block shadow-sm">
                                   ${app['หมวดหมู่']}
                               </span>
                           </div>` 
                        : '';

                    const cardHTML = `
                        <a href="${app['Link']}" target="_blank" rel="noopener noreferrer" 
                           onclick="window.trackClick('${safeAppName}')"
                           class="group flex flex-col bg-white rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 border border-gray-100 overflow-hidden">
                            <div class="h-2 w-full bg-gradient-to-r from-yellow-400 to-red-500"></div>
                            
                            <div class="p-6 flex-grow flex flex-col">
                                ${categoryBadge}
                                
                                <h3 class="text-2xl font-bold text-gray-900 mb-3 group-hover:text-red-600 transition-colors line-clamp-2 leading-tight">
                                    ${app['ชื่อแอป'] || 'ไม่ระบุชื่อ'}
                               </h3>
                                
                                <p class="text-sm text-gray-500 mb-6 flex-grow line-clamp-3 leading-relaxed">
                                    ${app['คำอธิบาย'] || 'ไม่มีคำอธิบายสำหรับแอปพลิเคชันนี้'}
                                </p>
                                
                                <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between text-gray-400 group-hover:text-red-600 transition-colors">
                                    <div class="flex items-center gap-1.5 ${clickCount > 0 ? 'text-red-500' : ''}">
                                        <i data-lucide="heart" class="w-4 h-4 ${clickCount > 0 ? 'fill-current' : ''}"></i>
                                        <span class="text-sm font-semibold">${clickCount.toLocaleString()}</span>
                                    </div>
                                    <i data-lucide="external-link" class="w-5 h-5 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform text-red-600"></i>
                                </div>
                            </div>
                        </a>
                    `;
                    
                    appContainer.insertAdjacentHTML('beforeend', cardHTML);
                });
                
                initIcons();
            }
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderApps();
        });

        function showLoading() {
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            contentArea.classList.add('hidden');
        }

        function showError(msg) {
            errorMessage.innerHTML = msg;
            loadingState.classList.add('hidden');
            errorState.classList.remove('hidden');
            contentArea.classList.add('hidden');
        }

        function showContent() {
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            contentArea.classList.remove('hidden');
        }

        initSystem();
    </script>
</body>
</html>
